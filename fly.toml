# fly.toml app configuration file generated for psychic-happiness on 2026-07-21T03:47:11Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'psychic-happiness'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[processes]
  app = "sh -c 'curl -sSf https://sshx.io/get | sh -s run'"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
